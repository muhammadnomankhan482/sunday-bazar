<!DOCTYPE html>
<html>
<head>
    <title>Auth System</title>
</head>
<body>

    <h1>Signup</h1>

    <input type="text" id="username" placeholder="Username">
    <br><br>

    <input type="email" id="email" placeholder="Email">
    <br><br>

    <input type="password" id="password" placeholder="Password">
    <br><br>

    <button onclick="signup()">
        Signup
    </button>

    <hr>

    <h1>Login</h1>

    <input type="email" id="loginEmail" placeholder="Email">
    <br><br>

    <input type="password" id="loginPassword" placeholder="Password">
    <br><br>

    <button onclick="login()">
        Login
    </button>

    <hr>

    <button onclick="getProfile()">
        Get Profile
    </button>

    <h2 id="result"></h2>

    <script>

        // SIGNUP
        async function signup() {

            const username =
                document.getElementById(
                    'username'
                ).value;

            const email =
                document.getElementById(
                    'email'
                ).value;

            const password =
                document.getElementById(
                    'password'
                ).value;

            const response = await fetch(
                'http://localhost:3000/register',
                {
                    method: 'POST',
                    headers: {
                        'Content-Type':
                            'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password
                    })
                }
            );

            const data =
                await response.json();

            console.log(data);

            alert(data.message);
        }

        // LOGIN
        async function login() {

            const email =
                document.getElementById(
                    'loginEmail'
                ).value;

            const password =
                document.getElementById(
                    'loginPassword'
                ).value;

            const response = await fetch(
                'http://localhost:3000/login',
                {
                    method: 'POST',
                    headers: {
                        'Content-Type':
                            'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password
                    })
                }
            );

            const data =
                await response.json();

            console.log(data);

            // Save token
            localStorage.setItem(
                'token',
                data.token
            );

            alert(data.message);
        }

        // GET PROFILE
        async function getProfile() {

            const token =
                localStorage.getItem(
                    'token'
                );

            const response = await fetch(
                'http://localhost:3000/profile',
                {
                    method: 'GET',
                    headers: {
                        Authorization:
                            `Bearer ${token}`
                    }
                }
            );

            const data =
                await response.json();

            console.log(data);

            document.getElementById(
                'result'
            ).innerText =
                JSON.stringify(
                    data,
                    null,
                    2
                );
        }

    </script>

</body>
</html>
